{% extends 'base.html' %}
{% block title %}{% if task %}Editar{% else %}Nueva{% endif %} Tarea{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-7">
  <div class="card shadow-sm">
    <div class="card-header py-3" style="background:#1a4a7c;color:white;">
      <h5 class="mb-0">{% if task %}Editar Tarea{% else %}Nueva Tarea{% endif %}</h5>
    </div>
    <div class="card-body p-4">
      <form method="POST">
        <div class="mb-3"><label class="form-label fw-semibold">Título *</label>
          <input type="text" name="title" class="form-control" value="{{ task.title if task else '' }}" required maxlength="200"></div>
        <div class="mb-3"><label class="form-label fw-semibold">Descripción</label>
          <textarea name="description" class="form-control" rows="3">{{ task.description if task else '' }}</textarea></div>
        <div class="row">
          <div class="col-md-6 mb-3"><label class="form-label fw-semibold">Prioridad</label>
            <select name="priority" class="form-select">
              <option value="low" {% if task and task.priority=='low' %}selected{% endif %}>🟢 Baja</option>
              <option value="medium" {% if not task or task.priority=='medium' %}selected{% endif %}>🟡 Media</option>
              <option value="high" {% if task and task.priority=='high' %}selected{% endif %}>🔴 Alta</option>
            </select></div>
          {% if task %}<div class="col-md-6 mb-3"><label class="form-label fw-semibold">Estado</label>
            <select name="status" class="form-select">
              <option value="pending" {% if task.status=='pending' %}selected{% endif %}>Pendiente</option>
              <option value="in_progress" {% if task.status=='in_progress' %}selected{% endif %}>En Progreso</option>
              <option value="completed" {% if task.status=='completed' %}selected{% endif %}>Completada</option>
            </select></div>{% endif %}
        </div>
        <div class="row">
          <div class="col-md-6 mb-3"><label class="form-label fw-semibold">Asignar a</label>
            <select name="assignee_id" class="form-select">
              <option value="">Sin asignar</option>
              {% for user in users %}<option value="{{ user.id }}" {% if task and task.assignee_id==user.id %}selected{% endif %}>{{ user.full_name }}</option>{% endfor %}
            </select></div>
          <div class="col-md-6 mb-3"><label class="form-label fw-semibold">Fecha Límite</label>
            <input type="date" name="due_date" class="form-control" value="{{ task.due_date.strftime('%Y-%m-%d') if task and task.due_date else '' }}"></div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn text-white" style="background:#1a4a7c;">{% if task %}Guardar{% else %}Crear{% endif %}</button>
          <a href="{{ url_for('tasks.list_tasks') }}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div></div>
{% endblock %}

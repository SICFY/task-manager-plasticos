{% extends 'base.html' %}
{% block title %}Editar Perfil{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6">
  <div class="card shadow-sm">
    <div class="card-header py-3" style="background:#1a4a7c;color:white;"><h5 class="mb-0">Editar Perfil</h5></div>
    <div class="card-body p-4">
      <form method="POST">
        <div class="mb-3"><label class="form-label fw-semibold">Nombre Completo</label>
          <input type="text" name="full_name" class="form-control" value="{{ current_user.full_name }}" required></div>
        <div class="mb-3"><label class="form-label fw-semibold">Correo Electrónico</label>
          <input type="email" name="email" class="form-control" value="{{ current_user.email }}" required></div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn text-white" style="background:#1a4a7c;">Guardar</button>
          <a href="{{ url_for('users.profile') }}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div></div>
{% endblock %}

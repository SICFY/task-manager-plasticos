{% extends 'base.html' %}
{% block title %}Cambiar Contraseña{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6">
  <div class="card shadow-sm">
    <div class="card-header py-3" style="background:#1a4a7c;color:white;"><h5 class="mb-0">Cambiar Contraseña</h5></div>
    <div class="card-body p-4">
      <form method="POST">
        <div class="mb-3"><label class="form-label fw-semibold">Contraseña Actual</label>
          <input type="password" name="current_password" class="form-control" required></div>
        <div class="mb-3"><label class="form-label fw-semibold">Nueva Contraseña</label>
          <input type="password" name="new_password" class="form-control" required minlength="6"></div>
        <div class="mb-3"><label class="form-label fw-semibold">Confirmar Nueva Contraseña</label>
          <input type="password" name="confirm_password" class="form-control" required></div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn text-white" style="background:#1a4a7c;">Cambiar</button>
          <a href="{{ url_for('users.profile') }}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div></div>
{% endblock %}

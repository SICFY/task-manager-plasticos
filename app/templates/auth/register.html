{% extends 'base.html' %}
{% block title %}Registro{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm mt-4">
      <div class="card-header text-center py-3" style="background:#1a4a7c;color:white;">
        <h4 class="mb-0"><i class="fas fa-user-plus me-2"></i>Crear Cuenta</h4>
      </div>
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3"><label class="form-label fw-semibold">Nombre Completo</label>
            <input type="text" name="full_name" class="form-control" required></div>
          <div class="mb-3"><label class="form-label fw-semibold">Usuario</label>
            <input type="text" name="username" class="form-control" required minlength="3"></div>
          <div class="mb-3"><label class="form-label fw-semibold">Correo Electrónico</label>
            <input type="email" name="email" class="form-control" required></div>
          <div class="mb-3"><label class="form-label fw-semibold">Contraseña</label>
            <input type="password" name="password" class="form-control" required minlength="6"></div>
          <div class="mb-3"><label class="form-label fw-semibold">Confirmar Contraseña</label>
            <input type="password" name="confirm_password" class="form-control" required></div>
          <button type="submit" class="btn w-100 text-white" style="background:#2e7d32;">Registrarse</button>
        </form>
        <hr><p class="text-center mb-0">¿Ya tienes cuenta? <a href="{{ url_for('auth.login') }}">Inicia sesión</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
